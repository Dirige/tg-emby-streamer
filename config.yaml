telegram:
  api_id: ${TELEGRAM_API_ID}
  api_hash: ${TELEGRAM_API_HASH}
  phone: ${TELEGRAM_PHONE}
  user_id: ${TELEGRAM_USER_ID}
  bot_token: ${TELEGRAM_BOT_TOKEN}
  session_string: ${TELEGRAM_SESSION_STRING}
  channel_id: ${TELEGRAM_CHANNEL_ID}
  monitor_channels:
    - ${TELEGRAM_MONITOR_CHANNELS}

proxy:
  enabled: ${PROXY_ENABLED}
  scheme: ${PROXY_SCHEME}
  hostname: ${PROXY_HOST}
  port: ${PROXY_PORT}

singbox:
  enabled: ${SINGBOX_ENABLED}
  address: ${SINGBOX_ADDRESS}
  port: ${SINGBOX_PORT}
  uuid: ${SINGBOX_UUID}
  path: ${SINGBOX_PATH}
  host: ${SINGBOX_HOST}
  tls: ${SINGBOX_TLS}
  fingerprint: ${SINGBOX_FINGERPRINT}
  socks_port: ${SINGBOX_SOCKS_PORT}

stream:
  host: ${STREAM_HOST}
  port: ${STREAM_PORT}
  base_url: ${BASE_URL}
  chunk_size: 1048576

tmdb:
  api_key: ${TMDB_API_KEY}
  language: ${TMDB_LANGUAGE}
  proxy: ${TMDB_PROXY}
  image_cdn: ${TMDB_IMAGE_CDN}

database:
  url: ${DATABASE_URL}

cache:
  dir: ${CACHE_DIR}
  media_path: ${MEDIA_PATH}
  memory_cache_size_mb: ${MEMORY_CACHE_SIZE}
  disk_cache_max_gb: ${DISK_CACHE_MAX_GB}
  prefetch_enabled: true
  prefetch_chunks: 30

strm:
  output_dir: ${STRM_OUTPUT_DIR}

worker:
  url: ${CF_WORKER_URL}
  secret: ${CF_WORKER_SECRET}

emby:
  host: ${EMBY_HOST}
  api_key: ${EMBY_API_KEY}
